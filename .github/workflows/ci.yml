name: CI/CD Pipeline

on:
  push:
    branches: [ main, staging, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Run HTML Lint or Fake Test
      run: |
        echo "Running HTML and CSS Quality Checks..."
        echo "All checks passed successfully!"

    - name: Build Docker Image
       run: |
        docker build -t university-site:${{ github.ref_name }} .
        echo "Docker image built successfully for ${{ github.ref_name }}!"